<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠打刻</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(180deg, #EEF4EC 0%, #F4F6F8 220px);
    color: #223327;
    min-height: 100vh;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 32px 16px 40px;
    text-align: center;
  }
  .site-title {
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin: 0 0 4px;
    color: #2F5D3A;
  }
  .site-subtitle {
    font-size: 12px;
    color: #6B8F73;
    letter-spacing: 0.15em;
    margin: 0 0 20px;
  }
  .divider {
    border: none;
    border-top: 1px solid #DCE6DC;
    margin: 24px 0;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 20px 24px;
    box-shadow: 0 4px 20px rgba(47, 93, 58, 0.08);
  }
  .register-heading {
    font-size: 16px;
    font-weight: 700;
    color: #B45309;
    margin: 0 0 8px;
  }
  .location-notice {
    font-size: 12px;
    color: #94A3B8;
    margin: 24px 0 0;
    line-height: 1.6;
  }
  .greeting {
    font-size: 14px;
    color: #5B7A62;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .clock {
    font-family: 'Courier New', monospace;
    font-size: 46px;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 2px 0 6px;
    color: #223327;
  }
  .date {
    font-size: 13px;
    color: #6B8F73;
    margin-bottom: 22px;
  }
  .summary-box {
    margin: 0 0 22px;
    padding: 16px 18px;
    border: 1px solid #DCE6DC;
    border-radius: 14px;
    background: #FAFCF9;
  }
  .summary-title {
    font-size: 13px;
    font-weight: 700;
    color: #5B7A62;
    letter-spacing: 0.05em;
    margin: 0 0 10px;
  }
  .summary-row {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #45564A;
    padding: 5px 0;
  }
  .summary-row .label { color: #8AA391; font-size: 13px; }
  .summary-row span.value {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    font-size: 16px;
    color: #223327;
  }
  .summary-row span.value.empty {
    font-family: inherit;
    font-weight: 400;
    font-size: 13px;
    color: #A8B5AC;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 18px;
    margin-bottom: 12px;
    border: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { opacity: 0.8; transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .btn-in   { background: #16A34A; }
  .btn-break{ background: #F59E0B; }
  .btn-out  { background: #DC2626; }
  .status {
    margin-top: 10px;
    margin-bottom: 10px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    display: none;
    text-align: left;
    white-space: pre-line;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }
  .status.show { display: block; }
  .status.center { text-align: center; }
  .status.ok    { background: #16A34A; color: #fff; }
  .status.error { background: #DC2626; color: #fff; }
  .status.loading { background: #374151; color: #fff; padding-bottom: 18px; }
  .status .progress-track { position: absolute; left: 0; bottom: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.25); }
  .status .progress-fill {
    position: absolute; bottom: 0; left: -40%; height: 4px; width: 40%;
    background: #fff; border-radius: 2px;
    animation: progressSlide 1.1s ease-in-out infinite;
  }
  @keyframes progressSlide {
    0% { left: -40%; }
    100% { left: 100%; }
  }
  .register-box {
    padding: 4px 0 8px;
  }
  .register-box p { margin: 0 0 12px; font-size: 14px; color: #334155; }
  .register-box input {
    width: 100%;
    padding: 13px;
    font-size: 16px;
    border: 1px solid #CBD5E1;
    border-radius: 10px;
    margin-bottom: 12px;
    font-family: inherit;
    text-align: center;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 30, 22, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1000;
  }
  .modal-box {
    background: #fff;
    border-radius: 18px;
    padding: 26px 22px 20px;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 10px 34px rgba(0,0,0,0.22);
    text-align: center;
  }
  .modal-box p {
    font-size: 16px;
    font-weight: 500;
    color: #223327;
    margin: 0 0 22px;
    line-height: 1.6;
  }
  .modal-buttons {
    display: flex;
    gap: 10px;
  }
  .modal-btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .modal-btn.cancel { background: #E5E7EB; color: #374151; }
  .modal-btn.ok { background: #16A34A; color: #fff; }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="site-title">🌾 もぐもぐ農園勤怠</h1>
  <p class="site-subtitle">TIME CARD</p>

  <div class="card">
    <div class="register-box" id="registerBox" style="display:none;">
      <p class="register-heading">⚠ 未登録です</p>
      <p>お名前（フルネーム）を入力して登録してください。</p>
      <input type="text" id="nameInput" placeholder="例：田中 太郎">
      <button class="btn btn-in" onclick="submitName()">登録する</button>
    </div>

    <div class="greeting" id="greeting">読み込み中...</div>
    <div class="status" id="status"></div>
    <div class="clock" id="clock">--:--</div>
    <div class="date" id="dateLabel"></div>

    <button class="btn btn-in" id="btnIn" onclick="handleClockIn()" disabled>出勤</button>
    <button class="btn btn-break" id="btnBreak" onclick="handleBreak()" disabled>休憩</button>
    <button class="btn btn-out" id="btnOut" onclick="handleClockOut()" disabled>退勤</button>

    <div class="summary-box" id="todaySummary">
      <p class="summary-title">本日の勤務状況</p>
      <div class="summary-row" id="rowIn"><span class="label">出勤</span><span class="value" id="timeIn">記録なし</span></div>
      <div class="summary-row" id="rowBreak"><span class="label">休憩</span><span class="value" id="timeBreak">記録なし</span></div>
      <div class="summary-row" id="rowOut"><span class="label">退勤</span><span class="value" id="timeOut">記録なし</span></div>
    </div>

    <button class="btn" id="btnTimecard" onclick="checkTimecard()" style="background:#4B5563; margin-top:10px;">今月のタイムカードを確認する</button>
  </div>

  <p class="location-notice">生産・収穫・作業記録のため、位置情報を取得してます。</p>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal-box">
    <p id="modalMessage"></p>
    <div class="modal-buttons">
      <button class="modal-btn cancel" id="modalCancel">キャンセル</button>
      <button class="modal-btn ok" id="modalOk">OK</button>
    </div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxuUbUBdAsIa0sj8F-cIvJX0rdTpNT8b5z53fqmBLt5PXPZTYBnN1FnuZR4Ln2r-ELm4g/exec';
var LIFF_ID = '2010745560-ZPeVu8OW';

var profile = null;

function tickClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2, '0');
  var m = String(now.getMinutes()).padStart(2, '0');
  var s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  var days = ['日','月','火','水','木','金','土'];
  document.getElementById('dateLabel').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日（' + days[now.getDay()] + '）';
}
setInterval(tickClock, 1000);
tickClock();

var statusHideTimer = null;
function setStatus(type, text, center) {
  var el = document.getElementById('status');
  clearTimeout(statusHideTimer);
  el.className = 'status show ' + type + (center ? ' center' : '');
  el.innerHTML = '';

  var msg = document.createElement('div');
  msg.textContent = text;
  el.appendChild(msg);

  if (type === 'loading') {
    var track = document.createElement('div');
    track.className = 'progress-track';
    var fill = document.createElement('div');
    fill.className = 'progress-fill';
    track.appendChild(fill);
    el.appendChild(track);
  } else {
    statusHideTimer = setTimeout(function () { el.classList.remove('show'); }, type === 'error' ? 4500 : 2500);
  }
}

function setButtonsDisabled(disabled) {
  document.getElementById('btnIn').disabled = disabled;
  document.getElementById('btnBreak').disabled = disabled;
  document.getElementById('btnOut').disabled = disabled;
}

// 出退勤の状態に応じて、押せるボタンだけを有効にする
function applyDayStatus(day, breakUsed, times) {
  var btnIn = document.getElementById('btnIn');
  var btnBreak = document.getElementById('btnBreak');
  var btnOut = document.getElementById('btnOut');
  if (day === 'none') {
    btnIn.disabled = false;
    btnBreak.disabled = true;
    btnOut.disabled = true;
  } else if (day === 'working') {
    btnIn.disabled = true;
    btnBreak.disabled = !!breakUsed;
    btnOut.disabled = false;
  } else { // done
    btnIn.disabled = true;
    btnBreak.disabled = true;
    btnOut.disabled = true;
  }
  updateTodaySummary(times || {});
}

function toggleSummaryRow_(rowId, spanId, value) {
  var span = document.getElementById(spanId);
  if (value) {
    span.textContent = value;
    span.classList.remove('empty');
  } else {
    span.textContent = '記録なし';
    span.classList.add('empty');
  }
}

function updateTodaySummary(times) {
  toggleSummaryRow_('rowIn', 'timeIn', times.clockInTime);
  toggleSummaryRow_('rowBreak', 'timeBreak', times.breakTime);
  toggleSummaryRow_('rowOut', 'timeOut', times.clockOutTime);
}

function callServer(payload) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).then(function (res) { return res.json(); });
}

function getLocation() {
  return new Promise(function (resolve) {
    if (!navigator.geolocation) { resolve({ lat: '', lng: '' }); return; }
    navigator.geolocation.getCurrentPosition(
      function (pos) { resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
      function () { resolve({ lat: '', lng: '' }); },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
}

function runAction(action, needsLocation) {
  if (!profile) { setStatus('error', 'ユーザー情報の取得に失敗しました。アプリを開き直してください。'); return; }
  setButtonsDisabled(true);
  setStatus('loading', '処理中...しばらくお待ちください');

  var locationPromise = needsLocation ? getLocation() : Promise.resolve({ lat: '', lng: '' });

  locationPromise.then(function (loc) {
    return callServer({
      action: action,
      userId: profile.userId,
      displayName: profile.displayName,
      lat: loc.lat,
      lng: loc.lng
    });
  }).then(function (result) {
    setStatus(result.status === 'ok' ? 'ok' : 'error', result.message);
    if (result.status === 'ok') {
      applyDayStatus(result.day, result.breakUsed, result);
    } else {
      // 失敗時は表示とサーバーの状態がずれている可能性があるため、念のため再確認する
      return callServer({ action: 'checkStatus', userId: profile.userId }).then(function (st) {
        if (st.status === 'ok') applyDayStatus(st.day, st.breakUsed, st);
      }).catch(function () {
        // 状態確認だけ失敗した場合は、誤操作を防ぐためボタンは無効のままにする
      });
    }
  }).catch(function () {
    setStatus('error', '通信エラーが発生しました。もう一度お試しください。');
    setButtonsDisabled(false); // 打刻自体が失敗した場合のみ、押し直せるようにする
  });
}

function showConfirm(message) {
  return new Promise(function (resolve) {
    var overlay = document.getElementById('modalOverlay');
    var okBtn = document.getElementById('modalOk');
    var cancelBtn = document.getElementById('modalCancel');
    document.getElementById('modalMessage').textContent = message;
    overlay.style.display = 'flex';

    function cleanup(result) {
      overlay.style.display = 'none';
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      resolve(result);
    }
    function onOk() { cleanup(true); }
    function onCancel() { cleanup(false); }

    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
  });
}

function handleClockIn() {
  showConfirm('出勤を記録しますが、よろしいですか？').then(function (ok) { if (ok) runAction('clockin', true); });
}
function handleBreak() {
  showConfirm('休憩を記録しますが、よろしいですか？').then(function (ok) { if (ok) runAction('break', false); });
}
function handleClockOut() {
  showConfirm('退勤を記録しますが、よろしいですか？').then(function (ok) { if (ok) runAction('clockout', true); });
}

function checkTimecard() {
  if (!profile) { setStatus('error', 'ユーザー情報の取得に失敗しました。アプリを開き直してください。'); return; }
  document.getElementById('btnTimecard').disabled = true;
  setStatus('loading', 'タイムカードを作成中...しばらくお待ちください');

  callServer({ action: 'generateTimecardPdf', userId: profile.userId }).then(function (result) {
    document.getElementById('btnTimecard').disabled = false;
    if (result.status === 'ok') {
      setStatus('ok', result.message);
      window.location.href = result.url;
    } else {
      setStatus('error', result.message);
    }
  }).catch(function () {
    document.getElementById('btnTimecard').disabled = false;
    setStatus('error', '通信エラーが発生しました。もう一度お試しください。');
  });
}

// QRコード経由（?action=clockin / ?action=clockout）でアクセスされた場合、
// 該当するボタンの確認ポップアップを自動で開く
function getQrAction_() {
  var params = new URLSearchParams(window.location.search);
  if (params.has('action')) return params.get('action');
  if (params.has('liff.state')) {
    var state = decodeURIComponent(params.get('liff.state'));
    var stateParams = new URLSearchParams(state.split('?')[1] || '');
    return stateParams.get('action');
  }
  return null;
}

var qrAutoTriggered_ = false;
function triggerQrActionIfNeeded_() {
  if (qrAutoTriggered_) return;
  var action = getQrAction_();
  if (action === 'clockin' && !document.getElementById('btnIn').disabled) {
    qrAutoTriggered_ = true;
    handleClockIn();
  } else if (action === 'clockout' && !document.getElementById('btnOut').disabled) {
    qrAutoTriggered_ = true;
    handleClockOut();
  }
}

function submitName() {
  if (!profile) { setStatus('error', 'ユーザー情報の取得に失敗しました。アプリを開き直してください。'); return; }
  var input = document.getElementById('nameInput');
  var name = input.value.trim();
  if (!name) { setStatus('error', 'お名前を入力してください。'); document.getElementById('status').classList.add('show'); return; }

  setStatus('loading', '確認中…しばらくお待ちください');
  document.getElementById('status').classList.add('show');

  callServer({ action: 'registerByName', userId: profile.userId, inputName: name }).then(function (result) {
    if (result.status === 'ok') {
      document.getElementById('registerBox').style.display = 'none';
      document.getElementById('greeting').textContent = result.name + ' さん';
      setStatus('ok', '初回登録が完了しました！\n今後は自動でログインされます！', true);
      applyDayStatus(result.day, result.breakUsed, result);
      triggerQrActionIfNeeded_();
    } else {
      setStatus('error', result.message || '登録に失敗しました。もう一度お試しください。');
    }
  }).catch(function () {
    setStatus('error', '通信エラーが発生しました。もう一度お試しください。');
  });
}

document.getElementById('greeting').textContent = '';

function withTimeout(promise, ms, stepName) {
  return Promise.race([
    promise,
    new Promise(function (_, reject) {
      setTimeout(function () { reject(new Error('TIMEOUT:' + stepName)); }, ms);
    })
  ]);
}

if (typeof liff === 'undefined') {
  setStatus('error', 'LIFF SDKの読み込みに失敗しました。通信環境をご確認のうえ開き直してください。');
} else {
  setStatus('loading', '読み込み中…しばらくお待ちください');
  withTimeout(liff.init({ liffId: LIFF_ID }), 10000, 'STEP1(init)').then(function () {
    if (!liff.isLoggedIn()) {
      setStatus('loading', 'ログイン処理中です。少し待ってから操作してください…');
      liff.login();
      return Promise.reject('LOGIN_REDIRECT');
    }
    setStatus('loading', 'ユーザー情報を取得中…しばらくお待ちください');
    return withTimeout(liff.getProfile(), 10000, 'STEP3(getProfile)');
  }).then(function (p) {
    profile = p;
    setStatus('loading', 'ユーザー確認中…しばらくお待ちください');
    return callServer({ action: 'init', userId: p.userId });
  }).then(function (result) {
    if (result.status === 'ok') {
      document.getElementById('greeting').textContent = result.name + ' さん';
      document.getElementById('status').classList.remove('show');
      applyDayStatus(result.day, result.breakUsed, result);
      triggerQrActionIfNeeded_();
    } else if (result.status === 'needName') {
      document.getElementById('status').classList.remove('show');
      document.getElementById('registerBox').style.display = 'block';
    } else {
      setStatus('error', result.message || 'ご利用が確認できませんでした。管理者にお問い合わせください。');
    }
  }).catch(function (err) {
    if (err === 'LOGIN_REDIRECT') return; // ログイン画面へ遷移中なので何もしない
    var detail = (err && err.message) ? err.message
               : (typeof err === 'string') ? err
               : JSON.stringify(err);
    setStatus('error', '初期化エラー：' + detail + '\n(この文言をそのまま開発者に伝えてください)');
  });
}
</script>
</body>
</html>
