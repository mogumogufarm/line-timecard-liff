<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤怠打刻</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(180deg, #EEF4EC 0%, #F4F6F8 220px);
    color: #223327;
    min-height: 100vh;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 32px 16px 40px;
    text-align: center;
  }
  .site-title {
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin: 0 0 4px;
    color: #2F5D3A;
  }
  .site-subtitle {
    font-size: 12px;
    color: #6B8F73;
    letter-spacing: 0.15em;
    margin: 0 0 20px;
  }
  .divider {
    border: none;
    border-top: 1px solid #DCE6DC;
    margin: 24px 0;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 20px 24px;
    box-shadow: 0 4px 20px rgba(47, 93, 58, 0.08);
  }
  .register-heading {
    font-size: 16px;
    font-weight: 700;
    color: #B45309;
    margin: 0 0 8px;
  }
  .location-notice {
    font-size: 12px;
    color: #94A3B8;
    margin: 24px 0 0;
    line-height: 1.6;
  }
  .greeting {
    font-size: 14px;
    color: #5B7A62;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .clock {
    font-family: 'Courier New', monospace;
    font-size: 46px;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 2px 0 6px;
    color: #223327;
  }
  .date {
    font-size: 13px;
    color: #6B8F73;
    margin-bottom: 22px;
  }
  .today-summary {
    margin: 0 0 22px;
    padding-top: 18px;
    border-top: 1px dashed #E2E8DE;
  }
  .summary-row {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #45564A;
    padding: 5px 0;
  }
  .summary-row .label { color: #8AA391; font-size: 13px; }
  .summary-row span.value {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    font-size: 16px;
    color: #223327;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px;
    margin-bottom: 12px;
    border: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn .icon { font-size: 20px; }
  .btn:active { opacity: 0.8; transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .btn-in   { background: #2F6F4E; }
  .btn-break{ background: #C9822A; }
  .btn-out  { background: #4B5563; }
  .status {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
    text-align: left;
  }
  .status.show { display: block; }
  .status.ok    { background: #E6F4EC; color: #1F5233; }
  .status.error { background: #FCEBEB; color: #7C2222; }
  .status.loading { background: #F1EFE8; color: #56534A; }
  .register-box {
    padding: 4px 0 8px;
  }
  .register-box p { margin: 0 0 12px; font-size: 14px; color: #334155; }
  .register-box input {
    width: 100%;
    padding: 13px;
    font-size: 16px;
    border: 1px solid #CBD5E1;
    border-radius: 10px;
    margin-bottom: 12px;
    font-family: inherit;
    text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="site-title">🌾 もぐもぐ農園勤怠</h1>
  <p class="site-subtitle">TIME CARD</p>

  <div class="card">
    <div class="register-box" id="registerBox" style="display:none;">
      <p class="register-heading">⚠ 未登録です</p>
      <p>お名前（フルネーム）を入力して登録してください。</p>
      <input type="text" id="nameInput" placeholder="例：田中 太郎">
      <button class="btn btn-in" onclick="submitName()"><span class="icon">✓</span>登録する</button>
    </div>

    <div class="greeting" id="greeting">読み込み中...</div>
    <div class="clock" id="clock">--:--</div>
    <div class="date" id="dateLabel"></div>

    <div class="today-summary" id="todaySummary">
      <div class="summary-row" id="rowIn" style="display:none;"><span class="label">🌅 出勤</span><span class="value" id="timeIn"></span></div>
      <div class="summary-row" id="rowBreak" style="display:none;"><span class="label">☕ 休憩</span><span class="value" id="timeBreak"></span></div>
      <div class="summary-row" id="rowOut" style="display:none;"><span class="label">🌇 退勤</span><span class="value" id="timeOut"></span></div>
    </div>

    <button class="btn btn-in" id="btnIn" onclick="handleClockIn()" disabled><span class="icon">🌅</span>出勤</button>
    <button class="btn btn-break" id="btnBreak" onclick="handleBreak()" disabled><span class="icon">☕</span>休憩</button>
    <button class="btn btn-out" id="btnOut" onclick="handleClockOut()" disabled><span class="icon">🌇</span>退勤</button>

    <div class="status" id="status"></div>
  </div>

  <p class="location-notice">生産・収穫・作業記録のため、位置情報を取得してます。</p>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxuUbUBdAsIa0sj8F-cIvJX0rdTpNT8b5z53fqmBLt5PXPZTYBnN1FnuZR4Ln2r-ELm4g/exec';
var LIFF_ID = '2010745560-ZPeVu8OW';

var profile = null;

function tickClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2, '0');
  var m = String(now.getMinutes()).padStart(2, '0');
  var s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  var days = ['日','月','火','水','木','金','土'];
  document.getElementById('dateLabel').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日（' + days[now.getDay()] + '）';
}
setInterval(tickClock, 1000);
tickClock();

function setStatus(type, text) {
  var el = document.getElementById('status');
  el.className = 'status show ' + type;
  el.textContent = text;
}

function setButtonsDisabled(disabled) {
  document.getElementById('btnIn').disabled = disabled;
  document.getElementById('btnBreak').disabled = disabled;
  document.getElementById('btnOut').disabled = disabled;
}

// 出退勤の状態に応じて、押せるボタンだけを有効にする
function applyDayStatus(day, breakUsed, times) {
  var btnIn = document.getElementById('btnIn');
  var btnBreak = document.getElementById('btnBreak');
  var btnOut = document.getElementById('btnOut');
  if (day === 'none') {
    btnIn.disabled = false;
    btnBreak.disabled = true;
    btnOut.disabled = true;
  } else if (day === 'working') {
    btnIn.disabled = true;
    btnBreak.disabled = !!breakUsed;
    btnOut.disabled = false;
  } else { // done
    btnIn.disabled = true;
    btnBreak.disabled = true;
    btnOut.disabled = true;
  }
  updateTodaySummary(times || {});
}

function toggleSummaryRow_(rowId, spanId, value) {
  var row = document.getElementById(rowId);
  if (value) {
    document.getElementById(spanId).textContent = value;
    row.style.display = 'flex';
  } else {
    row.style.display = 'none';
  }
}

function updateTodaySummary(times) {
  toggleSummaryRow_('rowIn', 'timeIn', times.clockInTime);
  toggleSummaryRow_('rowBreak', 'timeBreak', times.breakTime);
  toggleSummaryRow_('rowOut', 'timeOut', times.clockOutTime);
}

function callServer(payload) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).then(function (res) { return res.json(); });
}

function getLocation() {
  return new Promise(function (resolve) {
    if (!navigator.geolocation) { resolve({ lat: '', lng: '' }); return; }
    navigator.geolocation.getCurrentPosition(
      function (pos) { resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
      function () { resolve({ lat: '', lng: '' }); },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
}

function runAction(action, needsLocation) {
  if (!profile) { setStatus('error', 'ユーザー情報の取得に失敗しました。アプリを開き直してください。'); return; }
  setButtonsDisabled(true);
  setStatus('loading', '処理中...');

  var locationPromise = needsLocation ? getLocation() : Promise.resolve({ lat: '', lng: '' });

  locationPromise.then(function (loc) {
    return callServer({
      action: action,
      userId: profile.userId,
      displayName: profile.displayName,
      lat: loc.lat,
      lng: loc.lng
    });
  }).then(function (result) {
    setStatus(result.status === 'ok' ? 'ok' : 'error', result.message);
    return callServer({ action: 'checkStatus', userId: profile.userId }).then(function (st) {
      if (st.status === 'ok') applyDayStatus(st.day, st.breakUsed, st);
    }).catch(function () {
      // 状態確認だけ失敗した場合は、誤操作を防ぐためボタンは無効のままにする
    });
  }).catch(function () {
    setStatus('error', '通信エラーが発生しました。もう一度お試しください。');
    setButtonsDisabled(false); // 打刻自体が失敗した場合のみ、押し直せるようにする
  });
}

function handleClockIn()  { runAction('clockin', true); }
function handleBreak()    { runAction('break', false); }
function handleClockOut() { runAction('clockout', true); }

function submitName() {
  if (!profile) { setStatus('error', 'ユーザー情報の取得に失敗しました。アプリを開き直してください。'); return; }
  var input = document.getElementById('nameInput');
  var name = input.value.trim();
  if (!name) { setStatus('error', 'お名前を入力してください。'); document.getElementById('status').classList.add('show'); return; }

  setStatus('loading', '確認中…');
  document.getElementById('status').classList.add('show');

  callServer({ action: 'registerByName', userId: profile.userId, inputName: name }).then(function (result) {
    if (result.status === 'ok') {
      document.getElementById('registerBox').style.display = 'none';
      document.getElementById('greeting').textContent = result.name + ' さん';
      document.getElementById('status').classList.remove('show');
      return callServer({ action: 'checkStatus', userId: profile.userId }).then(function (st) {
        if (st.status === 'ok') applyDayStatus(st.day, st.breakUsed, st);
      });
    } else {
      setStatus('error', result.message || '登録に失敗しました。もう一度お試しください。');
    }
  }).catch(function () {
    setStatus('error', '通信エラーが発生しました。もう一度お試しください。');
  });
}

document.getElementById('greeting').textContent = '';

function withTimeout(promise, ms, stepName) {
  return Promise.race([
    promise,
    new Promise(function (_, reject) {
      setTimeout(function () { reject(new Error('TIMEOUT:' + stepName)); }, ms);
    })
  ]);
}

if (typeof liff === 'undefined') {
  setStatus('error', 'STEP0で失敗：LIFF SDKの読み込みに失敗しました。通信環境をご確認のうえ開き直してください。');
} else {
  setStatus('loading', 'STEP1：liff.init 実行中…');
  withTimeout(liff.init({ liffId: LIFF_ID }), 10000, 'STEP1(init)').then(function () {
    setStatus('loading', 'STEP2：ログイン状態を確認中…');
    if (!liff.isLoggedIn()) {
      setStatus('loading', 'STEP2：ログイン処理中です。少し待ってから操作してください…');
      liff.login();
      return Promise.reject('LOGIN_REDIRECT');
    }
    setStatus('loading', 'STEP3：プロフィール取得中…');
    return withTimeout(liff.getProfile(), 10000, 'STEP3(getProfile)');
  }).then(function (p) {
    profile = p;
    setStatus('loading', 'STEP4：ご利用登録を確認中…');
    return callServer({ action: 'checkRegistered', userId: p.userId });
  }).then(function (result) {
    if (result.status === 'ok') {
      document.getElementById('greeting').textContent = result.name + ' さん';
      document.getElementById('status').classList.remove('show');
      return callServer({ action: 'checkStatus', userId: profile.userId }).then(function (st) {
        if (st.status === 'ok') applyDayStatus(st.day, st.breakUsed, st);
      });
    } else if (result.status === 'needName') {
      document.getElementById('status').classList.remove('show');
      document.getElementById('registerBox').style.display = 'block';
    } else {
      setStatus('error', result.message || 'ご利用が確認できませんでした。管理者にお問い合わせください。');
    }
  }).catch(function (err) {
    if (err === 'LOGIN_REDIRECT') return; // ログイン画面へ遷移中なので何もしない
    var detail = (err && err.message) ? err.message
               : (typeof err === 'string') ? err
               : JSON.stringify(err);
    setStatus('error', '初期化エラー：' + detail + '\n(この文言をそのまま開発者に伝えてください)');
  });
}
</script>
</body>
</html>
