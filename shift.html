<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望提出</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(180deg, #EEF4EC 0%, #F4F6F8 220px);
    color: #223327;
    min-height: 100vh;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 32px 16px 110px; text-align: center; }
  .site-title { font-size: 21px; font-weight: 700; letter-spacing: 0.04em; margin: 0 0 4px; color: #2F5D3A; }
  .site-subtitle { font-size: 12px; color: #6B8F73; letter-spacing: 0.15em; margin: 0 0 20px; }
  .card { background: #fff; border-radius: 20px; padding: 24px 18px; box-shadow: 0 4px 20px rgba(47, 93, 58, 0.08); text-align: left; }
  .card-title { font-size: 15px; font-weight: 700; color: #2F5D3A; margin: 0 0 4px; text-align: center; }
  .card-sub { font-size: 12px; color: #6B8F79; margin: 0 0 16px; text-align: center; }
  .greeting { font-size: 13px; color: #5B7A62; text-align: center; margin-bottom: 14px; }
  .day-row { border: 1px solid #E2E8DE; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; }
  .day-label { font-size: 13px; font-weight: 700; margin: 0 0 8px; color: #223327; }
  .day-label.weekend { color: #C9822A; }
  .chip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .chip {
    padding: 9px 4px; font-size: 12px; text-align: center; border-radius: 8px;
    border: 1px solid #CBD5C9; background: #fff; color: #45564A; cursor: pointer; font-family: inherit;
  }
  .chip.selected { background: #16A34A; border-color: #16A34A; color: #fff; font-weight: 700; }
  .custom-time { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .custom-time select { flex: 1; padding: 8px; font-size: 13px; border-radius: 8px; border: 1px solid #CBD5C9; font-family: inherit; }
  .custom-time span { font-size: 12px; color: #6B8F79; }
  .btn {
    display: block; width: 100%; padding: 16px; margin-top: 16px; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 700; font-family: inherit; color: #fff; background: #2F6F4E; cursor: pointer;
  }
  .btn:disabled { opacity: 0.4; }
  #submitBtn {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 448px;
    z-index: 1500;
    margin-top: 0;
    box-shadow: 0 6px 18px rgba(47, 111, 78, 0.35);
  }
  .status {
    position: fixed;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 448px;
    z-index: 2000;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    display: none;
    white-space: pre-line;
    box-shadow: 0 10px 28px rgba(0,0,0,0.25);
  }
  .status.show { display: block; }
  .status.ok { background: #16A34A; color: #fff; }
  .status.error { background: #DC2626; color: #fff; }
  .status.loading { background: #374151; color: #fff; }
  .status .progress-track {
    height: 4px; background: rgba(255,255,255,0.25); border-radius: 3px; margin-top: 10px; overflow: hidden;
  }
  .status .progress-fill {
    height: 100%; width: 35%; background: #fff; border-radius: 3px;
    animation: statusProgress 1.1s ease-in-out infinite;
  }
  @keyframes statusProgress {
    0% { margin-left: -35%; }
    100% { margin-left: 100%; }
  }
  .my-shifts { margin-top: 20px; border-top: 1px dashed #E2E8DE; padding-top: 14px; }
  .my-shifts-title { font-size: 13px; font-weight: 700; color: #5B7A62; margin: 0 0 8px; }
  .shift-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px dashed #EDF1EA; }
  .shift-tag { font-weight: 700; font-size: 12px; }

  .tabs { display: flex; border: 1px solid #DCE6DC; border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
  .tab-btn { flex: 1; padding: 10px; border: none; background: #fff; color: #5B7A62; font-family: inherit; font-size: 14px; cursor: pointer; }
  .tab-btn.active { background: #2F6F4E; color: #fff; font-weight: 700; }

  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-nav button { border: none; background: #F1F5F0; color: #2F5D3A; border-radius: 8px; padding: 6px 12px; font-family: inherit; font-size: 14px; cursor: pointer; }
  .cal-nav button:disabled { opacity: 0.3; cursor: default; }
  .cal-month-label { font-size: 14px; font-weight: 700; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-head { font-size: 11px; color: #8AA391; text-align: center; }
  .cal-day {
    aspect-ratio: 1; border: 1px solid #E2E8DE; border-radius: 8px; padding: 3px;
    font-size: 11px; text-align: left; background: #fff; color: #223327;
  }
  .cal-day.enabled { cursor: pointer; }
  .cal-day.disabled { color: #C7D0C9; background: #F7F9F6; }
  .cal-day.chosen { background: #E6F4EC; border-color: #16A34A; }
  .cal-type-label { font-size: 9px; font-weight: 700; color: #16A34A; margin-top: 2px; }
  .cal-day.cal-status-pending { background: #FFF7E6; border-color: #F5DFAE; }
  .cal-day.cal-status-pending .cal-type-label { color: #8A5A0B; }
  .cal-day.cal-status-confirmed { background: #E6F4EC; border-color: #BEE0CC; }
  .cal-day.cal-status-confirmed .cal-type-label { color: #16A34A; }
  .cal-day.cal-status-rejected { background: #FCEBEB; border-color: #F3C9C9; color: #B9A6A6; }
  .cal-day.cal-status-rejected .cal-type-label { color: #C97C7C; }

  .legend-row { display: flex; flex-wrap: wrap; gap: 10px; font-size: 11px; color: #5B7A62; margin: 0 0 12px; }
  .legend-row .dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 3px; vertical-align: middle; }
  .dot-empty { background: #fff; border: 1px solid #CBD5C9; }
  .dot-pending { background: #FFF7E6; border: 1px solid #F5DFAE; }
  .dot-confirmed { background: #E6F4EC; border: 1px solid #BEE0CC; }
  .dot-rejected { background: #FCEBEB; border: 1px solid #F3C9C9; }

  .day-row-submitted { background: #F3F5F2; }
  .day-submitted-info { margin: 0; font-size: 13px; font-weight: 700; }
  .day-submitted-info.status-pending { color: #8A5A0B; }
  .day-submitted-info.status-confirmed { color: #16A34A; }
  .day-submitted-info.status-rejected { color: #C97C7C; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(20, 30, 22, 0.5);
    display: none; align-items: center; justify-content: center; padding: 24px; z-index: 1000;
  }
  .modal-overlay.show { display: flex; }
  .modal-box { background: #fff; border-radius: 18px; padding: 22px 20px; max-width: 320px; width: 100%; box-shadow: 0 10px 34px rgba(0,0,0,0.22); text-align: center; }
  .modal-box p.modal-title { font-size: 15px; font-weight: 700; margin: 0 0 14px; color: #223327; }
  .modal-buttons-row { display: flex; gap: 8px; margin-top: 10px; }
  .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .modal-btn.clear { background: #F1F5F0; color: #5B7A62; }
  .modal-btn.close { background: #E5E7EB; color: #374151; }
  .modal-btn.decide { background: #16A34A; color: #fff; }
  .modal-btn.decide:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="site-title">🌾 もぐもぐ農園</h1>
  <p class="site-subtitle">シフト希望提出</p>

  <div class="card">
    <div id="blockedMessage" style="display:none; text-align:center; padding: 20px 0;">
      <p style="font-weight:700; color:#B45309;">先に打刻ページで登録してください</p>
      <p style="font-size:13px; color:#5B7A62;">「①打刻システムへ」のページを開き、お名前を登録してから、このページをもう一度開いてください。</p>
    </div>

    <div id="mainContent" style="display:none;">
      <p class="card-title">シフト希望を提出</p>
      <p class="card-sub">今日から1ヶ月先まで、希望する日を選べます</p>
      <div class="greeting" id="greeting"></div>

      <div class="tabs">
        <button class="tab-btn active" id="tabListBtn" onclick="switchTab('list')">リスト</button>
        <button class="tab-btn" id="tabCalBtn" onclick="switchTab('calendar')">カレンダー</button>
      </div>

      <div class="legend-row">
        <span><i class="dot dot-empty"></i>未提出</span>
        <span><i class="dot dot-pending"></i>未確定</span>
        <span><i class="dot dot-confirmed"></i>確定</span>
        <span><i class="dot dot-rejected"></i>見送り</span>
      </div>

      <div id="listView">
        <div id="dayList"></div>
      </div>

      <div id="calendarView" style="display:none;">
        <div class="cal-nav">
          <button id="calPrevBtn" onclick="changeCalMonth(-1)">＜前の月</button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button id="calNextBtn" onclick="changeCalMonth(1)">次の月＞</button>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
      </div>

      <button class="btn" id="submitBtn" onclick="submitAll()">この内容で提出する</button>
      <div class="status" id="status"></div>

      <div class="my-shifts">
        <p class="my-shifts-title">提出済みのシフト希望</p>
        <p style="font-size:11px; color:#8AA391; margin:0 0 8px;">変更・取り消しは、上のリスト／カレンダーで該当日をタップしてください</p>
        <div id="myShiftsList" style="font-size:13px; color:#5B7A62;">読み込み中...</div>
      </div>
    </div>

    <div class="status" id="initStatus" style="display:block;">読み込み中...しばらくお待ちください</div>
  </div>
</div>

<div class="modal-overlay" id="dayModal">
  <div class="modal-box">
    <p class="modal-title" id="modalDateLabel"></p>
    <div class="chip-grid" id="modalChipGrid"></div>
    <div class="custom-time" id="modalCustomTime" style="display:none; justify-content:center;">
      <select id="modalStart"></select><span>〜</span><select id="modalEnd"></select>
    </div>
    <div class="modal-buttons-row">
      <button class="modal-btn close" onclick="cancelModalBtn()">キャンセル</button>
      <button class="modal-btn decide" id="modalDecideBtn" onclick="decideModal()" disabled>決定</button>
    </div>
    <p id="modalCancelLink" style="display:none; text-align:center; margin:14px 0 0;">
      <a href="javascript:void(0)" onclick="requestCancelShift()" style="font-size:12px; color:#DC2626;">このシフト希望を取り消す</a>
    </p>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <p class="modal-title" id="confirmMessage"></p>
    <div class="modal-buttons-row">
      <button class="modal-btn close" onclick="closeConfirm(false)">キャンセル</button>
      <button class="modal-btn decide" style="background:#DC2626;" onclick="closeConfirm(true)">取り消す</button>
    </div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxuUbUBdAsIa0sj8F-cIvJX0rdTpNT8b5z53fqmBLt5PXPZTYBnN1FnuZR4Ln2r-ELm4g/exec';
var LIFF_ID = '2010745560-7uisGwZP';

var profile = null;
var selections = {}; // { '2026-07-19': { type: '終日' } } または { type: 'カスタム', startTime: '09:00', endTime: '18:00' }
var myShiftsByDate = {}; // 提出済みシフト（サーバー側の内容）を日付ごとに保持
var calendarMonthOffset = 0; // 0=今月, 1=来月, 2=再来月（最大30日先までなので3ヶ月に収まる）
var modalDateStr = null;
var weekdayLabels = ['日', '月', '火', '水', '木', '金', '土'];

function toISO(d) { return d.toISOString().split('T')[0]; }

var statusHideTimer = null;
function setPageStatus(type, text) {
  var el = document.getElementById('status');
  clearTimeout(statusHideTimer);
  el.className = 'status show ' + type;
  el.innerHTML = '';

  var msg = document.createElement('div');
  msg.textContent = text;
  el.appendChild(msg);

  if (type === 'loading') {
    var track = document.createElement('div');
    track.className = 'progress-track';
    var fill = document.createElement('div');
    fill.className = 'progress-fill';
    track.appendChild(fill);
    el.appendChild(track);
  } else {
    statusHideTimer = setTimeout(function () { el.classList.remove('show'); }, type === 'error' ? 4500 : 2500);
  }
}

function switchTab(tab) {
  document.getElementById('tabListBtn').classList.toggle('active', tab === 'list');
  document.getElementById('tabCalBtn').classList.toggle('active', tab === 'calendar');
  document.getElementById('listView').style.display = (tab === 'list') ? 'block' : 'none';
  document.getElementById('calendarView').style.display = (tab === 'calendar') ? 'block' : 'none';
  if (tab === 'calendar') renderCalendarGrid();
}

function statusClass(status) {
  if (status === '確定') return 'confirmed';
  if (status === '却下') return 'rejected';
  return 'pending';
}

function submittedTimeLabel(s) {
  if (s.status === '確定') return s.confStart + '〜' + s.confEnd;
  return (s.type === 'カスタム') ? (s.prefStart + '〜' + s.prefEnd) : s.type;
}

function submittedStatusLabel(s) {
  if (s.status === '確定') return '確定';
  if (s.status === '却下') return '見送り';
  return '未確定（タップで編集）';
}

function buildDayList() {
  var container = document.getElementById('dayList');
  container.innerHTML = '';
  var today = new Date();
  for (var i = 0; i < 30; i++) {
    var d = new Date();
    d.setDate(today.getDate() + i);
    var dateStr = toISO(d);
    var wd = d.getDay();
    var label = (d.getMonth() + 1) + '月' + d.getDate() + '日(' + weekdayLabels[wd] + ')';
    var sel = selections[dateStr];
    var submitted = myShiftsByDate[dateStr];

    var row = document.createElement('div');
    row.className = 'day-row' + (submitted ? ' day-row-submitted' : '');

    var labelEl = document.createElement('p');
    labelEl.className = 'day-label' + ((wd === 0 || wd === 6) ? ' weekend' : '');
    labelEl.textContent = label;
    row.appendChild(labelEl);

    if (submitted) {
      var info = document.createElement('p');
      info.className = 'day-submitted-info status-' + statusClass(submitted.status);
      info.textContent = submittedTimeLabel(submitted) + '　' + submittedStatusLabel(submitted);
      row.appendChild(info);
      if (submitted.status === '未確定') {
        row.style.cursor = 'pointer';
        row.onclick = function (submitted) { return function () { openModalForEdit(submitted); }; }(submitted);
      }
      container.appendChild(row);
      continue;
    }

    var chipGrid = document.createElement('div');
    chipGrid.className = 'chip-grid';
    ['午前', '午後', '終日', 'カスタム'].forEach(function (type) {
      var chip = document.createElement('div');
      chip.className = 'chip' + (sel && sel.type === type ? ' selected' : '');
      chip.textContent = type;
      chip.onclick = function (dateStr, type) { return function () { selectType(dateStr, type); }; }(dateStr, type);
      chipGrid.appendChild(chip);
    });
    row.appendChild(chipGrid);

    var customBox = document.createElement('div');
    customBox.className = 'custom-time';
    customBox.style.display = (sel && sel.type === 'カスタム') ? 'flex' : 'none';
    customBox.id = 'custom-' + dateStr;
    var startSel = document.createElement('select');
    var endSel = document.createElement('select');
    fillHourOptions(startSel);
    fillHourOptions(endSel);
    startSel.value = (sel && sel.startTime) || '';
    endSel.value = (sel && sel.endTime) || '';
    startSel.onchange = function (dateStr, sel) { return function () { if (selections[dateStr]) selections[dateStr].startTime = sel.value; renderCalendarGrid(); }; }(dateStr, startSel);
    endSel.onchange = function (dateStr, sel) { return function () { if (selections[dateStr]) selections[dateStr].endTime = sel.value; renderCalendarGrid(); }; }(dateStr, endSel);
    customBox.appendChild(startSel);
    var tilde = document.createElement('span');
    tilde.textContent = '〜';
    customBox.appendChild(tilde);
    customBox.appendChild(endSel);
    row.appendChild(customBox);

    container.appendChild(row);
  }
}

// 先頭に「-」（未選択）を含む時刻プルダウンを作る（6時〜22時、1時間単位）
function fillHourOptions(sel) {
  var blank = document.createElement('option');
  blank.value = '';
  blank.textContent = '-';
  sel.appendChild(blank);
  for (var h = 6; h <= 22; h++) {
    var opt = document.createElement('option');
    opt.value = (h < 10 ? '0' + h : h) + ':00';
    opt.textContent = h + '時';
    sel.appendChild(opt);
  }
}

// 日付に対して区分（午前/午後/終日/カスタム）を選択・解除する（リスト用。押した瞬間に反映）
function selectType(dateStr, type) {
  var current = selections[dateStr];
  if (current && current.type === type) {
    delete selections[dateStr];
  } else if (type === 'カスタム') {
    var prev = (current && current.type === 'カスタム') ? current : null;
    selections[dateStr] = { type: 'カスタム', startTime: (prev && prev.startTime) || '', endTime: (prev && prev.endTime) || '' };
  } else {
    selections[dateStr] = { type: type };
  }
  buildDayList();
  renderCalendarGrid();
}

function changeCalMonth(delta) {
  calendarMonthOffset = Math.max(0, Math.min(2, calendarMonthOffset + delta));
  renderCalendarGrid();
}

function calDayLabel(sel) {
  if (sel.type === 'カスタム') {
    return (sel.startTime && sel.endTime) ? (sel.startTime + '〜' + sel.endTime) : 'カスタム(未設定)';
  }
  return sel.type;
}

function renderCalendarGrid() {
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  var maxDate = new Date(today);
  maxDate.setDate(maxDate.getDate() + 30);

  var viewMonth = new Date(today.getFullYear(), today.getMonth() + calendarMonthOffset, 1);
  document.getElementById('calMonthLabel').textContent = viewMonth.getFullYear() + '年' + (viewMonth.getMonth() + 1) + '月';
  document.getElementById('calPrevBtn').disabled = (calendarMonthOffset <= 0);
  document.getElementById('calNextBtn').disabled = (calendarMonthOffset >= 2);

  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  weekdayLabels.forEach(function (w) {
    var h = document.createElement('div');
    h.className = 'cal-head';
    h.textContent = w;
    grid.appendChild(h);
  });

  var firstDay = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  var daysInMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0).getDate();
  for (var i = 0; i < firstDay.getDay(); i++) grid.appendChild(document.createElement('div'));

  for (var d = 1; d <= daysInMonth; d++) {
    var dateObj = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), d);
    var dateStr = toISO(dateObj);
    var inRange = (dateObj >= today && dateObj <= maxDate);
    var submitted = myShiftsByDate[dateStr];
    var sel = selections[dateStr];

    var cell = document.createElement('div');
    var cls = 'cal-day ' + (inRange ? 'enabled' : 'disabled');
    var labelHtml = '';

    if (inRange && submitted) {
      cls += ' cal-status-' + statusClass(submitted.status);
      labelHtml = '<div class="cal-type-label">' + submittedTimeLabel(submitted) + '</div>';
      if (submitted.status === '未確定') {
        cell.onclick = function (submitted) { return function () { openModalForEdit(submitted); }; }(submitted);
      }
    } else if (inRange && sel) {
      cls += ' chosen';
      labelHtml = '<div class="cal-type-label">' + calDayLabel(sel) + '</div>';
      cell.onclick = function (dateStr) { return function () { openModalForDate(dateStr); }; }(dateStr);
    } else if (inRange) {
      cell.onclick = function (dateStr) { return function () { openModalForDate(dateStr); }; }(dateStr);
    }

    cell.className = cls;
    cell.innerHTML = d + labelHtml;
    grid.appendChild(cell);
  }
}

// ==== モーダル（カレンダーから開く／提出済みシフトの編集で開く） ====
// modalDraft は「決定」を押すまで確定しない一時的な選択内容
var modalMode = 'new'; // 'new' = カレンダーから新規選択, 'edit' = 提出済みシフトの編集
var modalToken = null;
var modalDraft = null;

function openModalForDate(dateStr) {
  modalMode = 'new';
  modalDateStr = dateStr;
  modalToken = null;
  var existing = selections[dateStr];
  modalDraft = existing ? { type: existing.type, startTime: existing.startTime || '', endTime: existing.endTime || '' } : { type: null, startTime: '', endTime: '' };
  renderModal();
}

function openModalForEdit(shift) {
  modalMode = 'edit';
  modalDateStr = shift.date;
  modalToken = shift.token;
  modalDraft = {
    type: shift.type,
    startTime: shift.type === 'カスタム' ? shift.prefStart : '',
    endTime: shift.type === 'カスタム' ? shift.prefEnd : ''
  };
  renderModal();
}

function renderModal() {
  var d = new Date(modalDateStr + 'T00:00:00');
  document.getElementById('modalDateLabel').textContent = (d.getMonth() + 1) + '月' + d.getDate() + '日(' + weekdayLabels[d.getDay()] + ')';

  var grid = document.getElementById('modalChipGrid');
  grid.innerHTML = '';
  ['午前', '午後', '終日', 'カスタム'].forEach(function (type) {
    var chip = document.createElement('div');
    chip.className = 'chip' + (modalDraft.type === type ? ' selected' : '');
    chip.textContent = type;
    chip.onclick = function (type) { return function () { toggleModalType(type); }; }(type);
    grid.appendChild(chip);
  });

  var customBox = document.getElementById('modalCustomTime');
  var startSel = document.getElementById('modalStart');
  var endSel = document.getElementById('modalEnd');
  if (!startSel.options.length) {
    fillHourOptions(startSel);
    fillHourOptions(endSel);
  }
  startSel.onchange = function () { modalDraft.startTime = startSel.value; updateDecideButtonState(); };
  endSel.onchange = function () { modalDraft.endTime = endSel.value; updateDecideButtonState(); };

  if (modalDraft.type === 'カスタム') {
    customBox.style.display = 'flex';
    startSel.value = modalDraft.startTime || '';
    endSel.value = modalDraft.endTime || '';
  } else {
    customBox.style.display = 'none';
  }

  updateDecideButtonState();
  document.getElementById('modalCancelLink').style.display = (modalMode === 'edit') ? 'block' : 'none';
  document.getElementById('dayModal').classList.add('show');
}

function toggleModalType(type) {
  if (modalDraft.type === type) {
    modalDraft.type = null;
  } else {
    modalDraft.type = type;
    if (type !== 'カスタム') { modalDraft.startTime = ''; modalDraft.endTime = ''; }
  }
  renderModal();
}

function updateDecideButtonState() {
  var valid = !!modalDraft.type && (modalDraft.type !== 'カスタム' || (modalDraft.startTime && modalDraft.endTime));
  document.getElementById('modalDecideBtn').disabled = !valid;
}

function decideModal() {
  if (!modalDraft.type) return;
  if (modalDraft.type === 'カスタム' && (!modalDraft.startTime || !modalDraft.endTime)) return;

  if (modalMode === 'new') {
    selections[modalDateStr] = { type: modalDraft.type, startTime: modalDraft.startTime, endTime: modalDraft.endTime };
    buildDayList();
    renderCalendarGrid();
    closeModal();
  } else {
    var token = modalToken;
    var draft = modalDraft;
    closeModal();
    callServer({
      action: 'updateShift', userId: profile.userId, token: token,
      type: draft.type, startTime: draft.startTime, endTime: draft.endTime
    }).then(function (result) {
      setPageStatus(result.status === 'ok' ? 'ok' : 'error', result.message);
      if (result.status === 'ok') loadMyShifts();
    });
  }
}

function cancelModalBtn() {
  closeModal();
}

function closeModal() {
  document.getElementById('dayModal').classList.remove('show');
  modalDateStr = null;
  modalToken = null;
  modalDraft = null;
}

// ==== 汎用の確認ポップアップ ====
var confirmResolver = null;

function showConfirm(message) {
  document.getElementById('confirmMessage').textContent = message;
  document.getElementById('confirmModal').classList.add('show');
  return new Promise(function (resolve) { confirmResolver = resolve; });
}

function closeConfirm(result) {
  document.getElementById('confirmModal').classList.remove('show');
  if (confirmResolver) { confirmResolver(result); confirmResolver = null; }
}

function requestCancelShift() {
  var token = modalToken;
  closeModal();
  showConfirm('このシフト希望を取り消しますか？').then(function (ok) {
    if (!ok) return;
    performCancelShift(token);
  });
}

function submitAll() {
  var entries = [];
  var incomplete = false;
  Object.keys(selections).forEach(function (dateStr) {
    var sel = selections[dateStr];
    if (sel.type === 'カスタム' && (!sel.startTime || !sel.endTime)) { incomplete = true; return; }
    var entry = { date: dateStr, type: sel.type };
    if (sel.type === 'カスタム') { entry.startTime = sel.startTime; entry.endTime = sel.endTime; }
    entries.push(entry);
  });

  if (incomplete) {
    setPageStatus('error', 'カスタムの時間が未選択の日があります。開始・終了時刻を選んでください。');
    return;
  }
  if (entries.length === 0) {
    setPageStatus('error', '希望する日を1つ以上選んでください。');
    return;
  }

  setPageStatus('loading', '送信中...しばらくお待ちください');
  document.getElementById('submitBtn').disabled = true;

  callServer({ action: 'submitShiftBatch', userId: profile.userId, displayName: profile.displayName, entries: entries })
    .then(function (result) {
      setPageStatus(result.status === 'ok' ? 'ok' : 'error', result.message);
      document.getElementById('submitBtn').disabled = false;
      if (result.status === 'ok') {
        selections = {};
        buildDayList();
        renderCalendarGrid();
        loadMyShifts();
      }
    }).catch(function () {
      setPageStatus('error', '通信エラーが発生しました。もう一度お試しください。');
      document.getElementById('submitBtn').disabled = false;
    });
}

function loadMyShifts() {
  callServer({ action: 'listMyShifts', userId: profile.userId }).then(function (result) {
    var el = document.getElementById('myShiftsList');
    myShiftsByDate = {};

    if (result.status !== 'ok' || !result.shifts || result.shifts.length === 0) {
      el.textContent = '提出済みのシフト希望はまだありません。';
      buildDayList();
      renderCalendarGrid();
      return;
    }

    result.shifts.forEach(function (s) { myShiftsByDate[s.date] = s; });

    el.innerHTML = '';
    result.shifts.forEach(function (s) {
      var tagColor = s.status === '確定' ? '#16A34A' : (s.status === '却下' ? '#DC2626' : '#C9822A');
      var timeLabel = s.status === '確定' ? (s.confStart + '〜' + s.confEnd) : (s.type + (s.type === 'カスタム' ? (' ' + s.prefStart + '〜' + s.prefEnd) : ''));
      var tagLabel = s.status === '確定' ? '確定' : (s.status === '却下' ? '見送り' : '未確定');

      var row = document.createElement('div');
      row.className = 'shift-row';
      row.innerHTML =
        '<span>' + s.date + ' ' + timeLabel + '</span>' +
        '<span class="shift-tag" style="color:' + tagColor + ';">' + tagLabel + '</span>';

      el.appendChild(row);
    });

    buildDayList();
    renderCalendarGrid();
  });
}

function performCancelShift(token) {
  setPageStatus('loading', '取り消し中...しばらくお待ちください');
  callServer({ action: 'cancelShift', userId: profile.userId, token: token }).then(function (result) {
    setPageStatus(result.status === 'ok' ? 'ok' : 'error', result.message);
    if (result.status === 'ok') loadMyShifts();
  });
}

function callServer(payload) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).then(function (res) { return res.json(); });
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise(function (_, reject) { setTimeout(function () { reject(new Error('TIMEOUT')); }, ms); })
  ]);
}

buildDayList();

if (typeof liff === 'undefined') {
  document.getElementById('initStatus').className = 'status show error';
  document.getElementById('initStatus').textContent = 'LIFF SDKの読み込みに失敗しました。開き直してください。';
} else {
  withTimeout(liff.init({ liffId: LIFF_ID }), 10000).then(function () {
    if (!liff.isLoggedIn()) { liff.login(); return Promise.reject('LOGIN_REDIRECT'); }
    return withTimeout(liff.getProfile(), 10000);
  }).then(function (p) {
    profile = p;
    return callServer({ action: 'init', userId: p.userId });
  }).then(function (result) {
    document.getElementById('initStatus').style.display = 'none';
    if (result.status === 'ok') {
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('greeting').textContent = result.name + ' さん';
      loadMyShifts();
    } else {
      document.getElementById('blockedMessage').style.display = 'block';
    }
  }).catch(function (err) {
    if (err === 'LOGIN_REDIRECT') return;
    var el = document.getElementById('initStatus');
    el.className = 'status show error';
    el.textContent = '初期化エラー：' + ((err && err.message) ? err.message : err);
  });
}
</script>
</body>
</html>
